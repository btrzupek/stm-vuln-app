# Auto-generated by recall-portal for btrzupek/stm-vuln-app.
# Runs on every push to main and ships a delta payload to recall.
# Run manually with mode=full for a complete re-index (e.g. first onboarding).
#
# RECALL_INGEST_TOKEN is set as an Actions secret by recall-portal automatically.

name: Reindex on merge

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Indexing mode'
        required: false
        default: 'delta'
        type: choice
        options:
          - delta
          - full

jobs:
  reindex:
    name: 'Reindex (${{ inputs.mode || ''delta'' }})'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      RECALL_URL: https://recall-dev-agitk5jfpq-uc.a.run.app
      TENANT_ID: btrzupek
      REPO_ID: stm-vuln-app
      MODE: ${{ inputs.mode || 'delta' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve revision
        id: rev
        shell: bash
        run: |
          set -euo pipefail
          sha="${GITHUB_SHA}"
          printf 'sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"

      - name: Build delta payload
        if: env.MODE == 'delta'
        id: delta
        shell: python3 {0}
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ steps.rev.outputs.sha }}
        run: |
          import base64, json, os, subprocess, sys

          before = os.environ["BEFORE"]
          sha = os.environ["SHA"]
          repo_id = os.environ["REPO_ID"]

          if not before or before == "0000000000000000000000000000000000000000":
              before = f"{sha}~1"

          changed = subprocess.run(
              ["git", "diff", "--name-only", "--diff-filter=AM", f"{before}...{sha}"],
              capture_output=True, text=True,
          )
          paths = [p for p in changed.stdout.splitlines() if p.strip()]

          deleted = subprocess.run(
              ["git", "diff", "--name-only", "--diff-filter=D", f"{before}...{sha}"],
              capture_output=True, text=True,
          )
          deleted_paths = [p for p in deleted.stdout.splitlines() if p.strip()]

          if not paths and not deleted_paths:
              print("No changed or deleted files detected; skipping ingest")
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write("skip=true\n")
              sys.exit(0)

          files = []
          for path in paths:
              if not os.path.isfile(path):
                  continue
              try:
                  with open(path, "rb") as fh:
                      files.append({
                          "path": path,
                          "content_base64": base64.b64encode(fh.read()).decode(),
                      })
              except OSError as exc:
                  print(f"Warning: skipping {path}: {exc}", file=sys.stderr)

          payload = {
              "repo_id": repo_id,
              "revision": sha,
              "mode": "delta",
              "files": files,
              "deleted_paths": deleted_paths,
          }
          with open("recall_payload.json", "w") as fh:
              json.dump(payload, fh)

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write("skip=false\n")

          print(f"Bundled {len(files)} changed file(s), {len(deleted_paths)} deleted")

      - name: Build full payload
        if: env.MODE == 'full'
        shell: python3 {0}
        env:
          SHA: ${{ steps.rev.outputs.sha }}
        run: |
          import base64, json, os, sys

          SKIP_DIRS = {".git", "node_modules", "vendor"}
          MAX_BYTES = 500 * 1024 * 1024  # 500 MB

          repo_id = os.environ["REPO_ID"]
          sha = os.environ["SHA"]

          total = 0
          files = []
          done = False
          for root, dirs, filenames in os.walk("."):
              if done:
                  break
              dirs[:] = sorted(d for d in dirs if d not in SKIP_DIRS)
              for name in sorted(filenames):
                  abs_path = os.path.join(root, name)
                  rel_path = os.path.relpath(abs_path)
                  try:
                      size = os.path.getsize(abs_path)
                  except OSError:
                      continue
                  if total + size > MAX_BYTES:
                      print(f"500 MB limit reached before {rel_path}; stopping", file=sys.stderr)
                      done = True
                      break
                  try:
                      with open(abs_path, "rb") as fh:
                          files.append({
                              "path": rel_path,
                              "content_base64": base64.b64encode(fh.read()).decode(),
                          })
                      total += size
                  except OSError as exc:
                      print(f"Warning: skipping {rel_path}: {exc}", file=sys.stderr)

          payload = {
              "repo_id": repo_id,
              "revision": sha,
              "mode": "full",
              "replace": True,
              "files": files,
          }
          with open("recall_payload.json", "w") as fh:
              json.dump(payload, fh)

          print(f"Bundled {len(files)} file(s) ({total // 1_048_576} MB)")

      - name: POST to /v1/ingest
        if: env.MODE == 'full' || (env.MODE == 'delta' && steps.delta.outputs.skip == 'false')
        shell: bash
        env:
          RECALL_INGEST_TOKEN: ${{ secrets.RECALL_INGEST_TOKEN }}
        run: |
          set -euo pipefail
          http_status=$(
            curl --silent --show-error \
              --output recall_response.json \
              --write-out '%{http_code}' \
              --request POST \
              --header "Authorization: Bearer ${RECALL_INGEST_TOKEN}" \
              --header 'Content-Type: application/json' \
              --data @recall_payload.json \
              "${RECALL_URL}/v1/ingest"
          )
          echo "HTTP status: ${http_status}"
          [ -f recall_response.json ] && cat recall_response.json
          if [ "${http_status}" != "202" ]; then
            echo "::error::Ingest failed with HTTP ${http_status}" >&2
            exit 1
          fi
